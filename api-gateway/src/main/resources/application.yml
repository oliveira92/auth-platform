spring:
  application:
    name: api-gateway
  config:
    import: "optional:aws-parameterstore:/config/auth-platform/api-gateway/"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Auth Service routes (public - login, refresh, validate)
        - id: auth-service-public
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/auth/(?<segment>.*), /api/v1/auth/${segment}

        # Authorization Service routes (protected)
        - id: authorization-service
          uri: lb://authorization-service
          predicates:
            - Path=/api/v1/authorization/**, /api/v1/applications/**

        # Swagger UI aggregation
        - id: auth-service-swagger
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/(?<segment>.*), /${segment}

        - id: authorization-service-swagger
          uri: lb://authorization-service
          predicates:
            - Path=/authorization-service/v3/api-docs
          filters:
            - RewritePath=/authorization-service/(?<segment>.*), /${segment}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

auth:
  gateway:
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    jwt-issuer: ${JWT_ISSUER:auth-platform}

aws:
  region: ${AWS_REGION:us-east-1}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:eureka-secret@localhost:8761/eureka/}
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: authorization-service
        url: /authorization-service/v3/api-docs

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.authplatform: DEBUG
    org.springframework.cloud.gateway: INFO
