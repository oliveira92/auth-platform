# Local profile - overrides for Docker Compose / LocalStack environment

spring:
  config:
    import: ""  # Disable Parameter Store for local — config comes from env vars and application.yml defaults
  cloud:
    aws:
      region:
        static: us-east-1
      endpoint: http://localstack:4566
      credentials:
        access-key: test
        secret-key: test

aws:
  endpoint-override: http://localstack:4566
  region: us-east-1

logging:
  level:
    com.authplatform: DEBUG
