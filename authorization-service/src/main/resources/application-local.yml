# Local profile - overrides for Docker Compose / LocalStack environment

spring:
  cloud:
    aws:
      region:
        static: us-east-1
      endpoint: ${AWS_ENDPOINT_OVERRIDE:http://localhost:4566}
      credentials:
        access-key: test
        secret-key: test
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authplatform}
    username: ${DB_USERNAME:authplatform}
    password: ${DB_PASSWORD:authplatform}

aws:
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:http://localhost:4566}
  region: us-east-1

logging:
  level:
    com.authplatform: DEBUG

auth:
  platform:
    issuer: ${AUTH_ISSUER:auth-platform}
    jwks-uri: ${AUTH_JWKS_URI:http://localhost:8081/.well-known/jwks.json}
    introspection-url: ${AUTH_INTROSPECTION_URL:http://localhost:8081/api/v1/auth/validate}
    token-algorithm: ${AUTH_TOKEN_ALGORITHM:RS256}
