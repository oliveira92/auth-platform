spring:
  application:
    name: authorization-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/authplatform}
    username: ${DB_USERNAME:authplatform}
    password: ${DB_PASSWORD:authplatform}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthorizationCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

spring.threads.virtual.enabled: true

auth:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: ${JWT_ISSUER:auth-platform}
  aws:
    secrets:
      jwt-public-key-name: ${AWS_JWT_PUBLIC_KEY_SECRET:auth-platform/shared/jwt-public-key}

aws:
  region: ${AWS_REGION:us-east-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.authplatform: DEBUG

---
spring:
  config:
    activate:
      on-profile: "!local"
    import: "optional:aws-parameterstore:/config/auth-platform/authorization-service/"
