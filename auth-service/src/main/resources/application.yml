spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

# Virtual Threads (Java 21+)
spring.threads.virtual.enabled: true

# LDAP Configuration (overridden by AWS Parameter Store in non-local envs)
auth:
  ldap:
    url: ${LDAP_URL:ldap://openldap:389}
    base-dn: ${LDAP_BASE_DN:dc=authplatform,dc=com}
    user-dn: ${LDAP_USER_DN:cn=admin,dc=authplatform,dc=com}
    password: ${LDAP_PASSWORD:admin}
    default-domain: ${LDAP_DEFAULT_DOMAIN:default}
    user-search-base: ${LDAP_USER_SEARCH_BASE:ou=users}
    user-search-filter: ${LDAP_USER_SEARCH_FILTER:(uid={0})}
    group-search-base: ${LDAP_GROUP_SEARCH_BASE:ou=groups}
    group-search-filter: ${LDAP_GROUP_SEARCH_FILTER:(member={0})}
    cache:
      enabled: ${LDAP_CACHE_ENABLED:true}
      user-ttl-seconds: ${LDAP_CACHE_USER_TTL_SECONDS:300}
      sync-enabled: ${LDAP_GROUP_SYNC_ENABLED:true}
      sync-interval-ms: ${LDAP_GROUP_SYNC_INTERVAL_MS:300000}
      sync-initial-delay-ms: ${LDAP_GROUP_SYNC_INITIAL_DELAY_MS:60000}

  jwt:
    issuer: ${JWT_ISSUER:auth-platform}
    audience: ${JWT_AUDIENCE:auth-platform-api}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION:86400}
    # RSA keys loaded from AWS Secrets Manager in non-local envs
    # For local, use the keys configured in application-local.yml
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}

  aws:
    secrets:
      jwt-secret-name: ${AWS_JWT_SECRET_NAME:auth-platform/auth-service/jwt-keys}
      ldap-secret-name: ${AWS_LDAP_SECRET_NAME:auth-platform/auth-service/ldap-credentials}

  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    ip-limit: ${RATE_LIMIT_IP_LIMIT:120}
    application-limit: ${RATE_LIMIT_APPLICATION_LIMIT:600}

  audit:
    enabled: ${AUDIT_ENABLED:false}
    base-url: ${AUDIT_SERVICE_URL:http://localhost:8083}
    connect-timeout-ms: ${AUDIT_CONNECT_TIMEOUT_MS:500}
    read-timeout-ms: ${AUDIT_READ_TIMEOUT_MS:1000}

aws:
  region: ${AWS_REGION:us-east-1}
  endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.authplatform: DEBUG
    org.springframework.ldap: INFO
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: "!local"
    import: "optional:aws-parameterstore:/config/auth-platform/auth-service/"
