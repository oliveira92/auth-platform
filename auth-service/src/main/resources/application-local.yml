# Local profile - uses OpenLDAP test container and local RSA keys
# Run: scripts/generate-rsa-keys.sh to create RSA keys

spring:
  config:
    import: ""  # Disable AWS Parameter Store for local

aws:
  endpoint-override: "http://localstack:4566"
  region: us-east-1

auth:
  ldap:
    url: "ldap://openldap:389"
    base-dn: "dc=authplatform,dc=com"
    user-dn: "cn=admin,dc=authplatform,dc=com"
    password: "admin"
    user-search-base: "ou=users"
    user-search-filter: "(uid={0})"
    group-search-base: "ou=groups"
    group-search-filter: "(memberUid={0})"

  # For local, RSA keys are loaded from environment variables set by docker-compose
  # or from the .local-keys/ directory (generated by scripts/generate-rsa-keys.sh)
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    public-key: ${JWT_PUBLIC_KEY:}

logging:
  level:
    com.authplatform: DEBUG
    org.springframework.ldap: DEBUG
