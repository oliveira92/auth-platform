spring:
  application:
    name: audit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/authplatform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:authplatform}
    password: ${DB_PASSWORD:authplatform}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: AuditCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: audit_flyway_schema_history

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

spring.threads.virtual.enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.authplatform: DEBUG

---
spring:
  config:
    activate:
      on-profile: "!local"
    import: "optional:aws-parameterstore:/config/auth-platform/audit-service/"
